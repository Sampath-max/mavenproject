name: maven-project
on:
  push:
    branches: ["master"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: cloning the repository
        uses: actions/checkout@v7.0.0
      - name: installing the java
        uses: actions/setup-java@v5.5.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: generating the build
        run: mvn package
      
